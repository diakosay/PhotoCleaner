name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project PhotoCleaner.xcodeproj \
            -scheme PhotoCleaner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/

          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/PhotoCleaner.app Payload/
          zip -r PhotoCleaner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCleaner-IPA
          path: PhotoCleaner.ipa
          retention-days: 7
